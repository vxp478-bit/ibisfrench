<!DOCTYPE html>

  <title>Explication de Grammaire - Pronoms</title>
  <style>
  body {
    font-family: 'Dongle', 'Sansation';
    padding: 20px;
    background: #fff;
    color: #111;
  }

  /* MAIN CONTAINER */
  .container {
    max-width: 900px;
    margin: auto;
  }

  /* HEADINGS */
  h1 {
    font-size: 34px;
    margin-bottom: 20px;
  }

  h2 {
    margin-top: 0;
    font-size: 24px;
  }

  /* CARDS */
  .card {
    background: #fff;
    border: 1px solid #e6e6e6;
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 16px;
  }

  /* TIP BOX */
  .tip {
    background: #f7f7f7;
    border-left: 4px solid #2e7d32;
    padding: 12px 15px;
    margin: 15px 0;
    border-radius: 6px;
    font-size: 16px;
  }

  /* EXAMPLES */
  .example {
    background: #f3f8f3;
    padding: 10px 12px;
    border-radius: 6px;
    margin-top: 6px;
    font-style: italic;
  }

  /* LISTS */
  ul {
    padding-left: 20px;
    margin-top: 8px;
  }

  li {
    margin-bottom: 6px;
  }

  /* VERB SECTION */
  .verbs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-top: 10px;
  }

  .verb-box {
    border: 1px solid #e6e6e6;
    border-radius: 12px;
    padding: 15px;
    background: #fff;
  }

  .verb-box h3 {
    margin-top: 0;
    margin-bottom: 10px;
  }

  /* HEADER NAV IMPROVEMENT (subtle only) */
  .site-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
    padding-bottom: 10px;
    border-bottom: 1px solid #eee;
  }

  .header-nav a {
    margin-left: 12px;
    text-decoration: none;
    color: #333;
  }

  .header-nav a:hover {
    text-decoration: underline;
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .verbs {
      grid-template-columns: 1fr;
    }

    .site-header {
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }
  }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">

</head>
