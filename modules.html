<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Modules - ibis FRENCH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Almendra+Display&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Dongle:wght@300;400;700&family=Sansation:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
  </head>
  <body>
    <div class="site">
      <header class="site-header">
        <div class="logo"><span class="logo-ibis">ibis</span> <span class="logo-french">FRENCH</span></div>
        <div class="auth">
          <button class="auth-btn">se connecter</button>
          <button class="auth-btn outline">s'inscrire</button>
        </div>
      </header>

      <main class="modules-container">
        <div class="module-item">
          <h2 class="module-title">
            <span class="module-number">Module 3.1:</span>
            <span class="module-subtitle">Le conditionnel et la politesse</span>
          </h2>
          <p class="module-date">rendrez le [date]</p>
          <!-- ajoutez le <time> tag pour les dates de rendre -->
          <div class="module-divider"></div>
        </div>

        <div class="module-item">
          <h2 class="module-title">
            <span class="module-number">Module 2.1:</span>
            <span class="module-subtitle">Chronologie des temps verbaux</span>
          </h2>
          <p class="module-date">rendrez le [date]</p>
          <!-- ajoutez le <time> tag pour les dates de rendre -->
          <div class="module-divider"></div>
        </div>

        <div class="modules-footer">
          <a class="see-more" href="#">voir plus</a>
        </div>
      </main>
    </div>
  </body>
</html>
