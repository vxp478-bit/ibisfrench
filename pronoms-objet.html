<h1>Exercice : Les Pronoms Objets</h1>
<p>Complétez ce paragraphe avec les pronoms objets <strong>directs</strong> et <strong>indirects</strong>.</p>

<form id="exerciseForm">
  <label>
    1. Dans les années 1970, plusieurs chefs français créent la Nouvelle Cuisine. 
    Ils veulent moderniser la cuisine traditionnelle et ils  
    <select data-answer="la">
      <option value="">--</option>
      <option value="la">la</option>
      <option value="lui">lui</option>
      <option value="leur">leur</option>
    </select>
    transforment complètement.
    <span class="feedback"></span>
  </label>

  <br><br>
  <button type="button" onclick="checkAnswers()">Vérifier</button>
</form>

<script>
function checkAnswers() {
  const selects = document.querySelectorAll('#exerciseForm select');

  selects.forEach(select => {
    const correctAnswer = select.dataset.answer;
    const feedback = select.parentElement.querySelector('.feedback');

    if (select.value === "") {
      feedback.textContent = " ⚠ Choisissez une réponse";
      feedback.className = "feedback incorrect";
    } 
    else if (select.value === correctAnswer) {
      feedback.textContent = " ✔ Correct";
      feedback.className = "feedback correct";
    } 
    else {
      feedback.textContent = " ✖ Incorrect";
      feedback.className = "feedback incorrect";
    }
  });
}
</script>
