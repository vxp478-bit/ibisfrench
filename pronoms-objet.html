<body oncontextmenu="return false" oncopy="return false" oncut="return false" onpaste="return false">

<h1>Complétez ce paragraphe avec les pronoms objets directs et indirects.</h1>

<form id="exerciseForm">
  <label>
    1. Dans les années 1970, plusieurs chefs français créent la Nouvelle Cuisine. 
    Ils veulent moderniser la cuisine traditionnelle et ils  
    <select data-answer="la">
      <option value="">--</option>
      <option value="la">la</option>
      <option value="lui">lui</option>
      <option value="leur">leur</option>
    </select>
    transforment complètement.
    <span class="feedback"></span>
  </label>
  <br><br>
    <label>
    2. Les chefs commencent à utiliser des ingrédients frais et ils   
    <select data-answer="les">
      <option value="">--</option>
      <option value="leur">leur</option>
      <option value="y">y</option>
      <option value="les">les</option>
    </select>
    préparent avec beaucoup de créativité.
    <span class="feedback"></span>
  </label>
  <br><br>
    <label>
    3. Ils expérimentent avec des nouvelles techniques et ils   
    <select data-answer="les">
      <option value="">--</option>
      <option value="les">les</option>
      <option value="leur">leur</option>
      <option value="en">en</option>
    </select>
    utilisent beaucoup pour innover les préparations traditionnelles.
    <span class="feedback"></span>
  </label>
  <br><br>
    <label>
    4. La cuisine classique, au contraire, utilise souvent des sauces riches et des préparations plus longues. Les chefs traditionnels   
    <select data-answer="y">
      <option value="">--</option>
      <option value="en">en</option>
      <option value="y">y</option>
      <option value="leur">leur</option>
    </select>
    consacrent beaucoup de temps. 
    <span class="feedback"></span>
  </label>
  <br><br>
    <label>
    5. Dans la Nouvelle Cuisine, les chefs préfèrent la simplicité. Ils   
    <select data-answer="leur">
      <option value="">--</option>
      <option value="en">en</option>
      <option value="y">y</option>
      <option value="leur">leur</option>
    </select>
    donnent plus de place aux légumes frais et aux produits de saison.  
    <span class="feedback"></span>
  </label>
  <br><br>
    <label>
    6. Les critiques gastronomiques parlent beaucoup de ce mouvement et ils   
    <select data-answer="en">
      <option value="">--</option>
      <option value="en">en</option>
      <option value="y">y</option>
      <option value="leur">leur</option>
    </select>
    écrivent souvent dans les journaux de l'époque.   
    <span class="feedback"></span>
  </label>
  <br><br>
    <label>
    7. Aujourd’hui encore, de nombreux chefs admirent cette révolution culinaire et ils 
    <select data-answer="la">
      <option value="">--</option>
      <option value="le">le</option>
      <option value="la">la</option>
      <option value="leur">leur</option>
    </select>
    considèrent comme une étape importante de la gastronomie française.
    <span class="feedback"></span>
  </label>
  <br><br>

  <button type="button" onclick="checkAnswers()">Vérifier</button>
</form>

<script>
function checkAnswers() {
  const selects = document.querySelectorAll('#exerciseForm select');

  selects.forEach(select => {
    const correctAnswer = select.dataset.answer;
    const feedback = select.parentElement.querySelector('.feedback');

    if (select.value === "") {
      feedback.textContent = " ⚠ Choisissez une réponse";
      feedback.className = "feedback incorrect";
    } 
    else if (select.value === correctAnswer) {
      feedback.textContent = " ✔ Correct";
      feedback.className = "feedback correct";
    } 
    else {
      feedback.textContent = " ✖ Incorrect";
      feedback.className = "feedback incorrect";
    }
  });
}
</script>
